{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Change Password | CampusConnect{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">

    <div class="mb-4">
      <h1 class="page-title mb-1">
        <i class="bi bi-shield-lock text-primary me-2"></i>Change Password
      </h1>
      <p class="text-muted">Keep your account secure with a strong password.</p>
    </div>

    <div class="card-container">
      <form method="POST">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="d-flex gap-2 mt-3">
          <button class="btn btn-primary" type="submit">
            <i class="bi bi-lock me-1"></i>Update Password
          </button>
          <a href="{% url 'users:dashboard' %}" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>

  </div>
</div>
{% endblock %}
