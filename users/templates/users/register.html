{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Register | CampusConnect{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7 col-lg-6">

    <div class="text-center mb-4">
      <div style="font-size:2.5rem; color:var(--primary);">
        <i class="bi bi-person-plus-fill"></i>
      </div>
      <h1 class="h3 fw-bold mt-2">Create your account</h1>
      <p class="text-muted">Join the CampusConnect community</p>
    </div>

    <div class="card-container">
      <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="d-grid mt-3">
          <button type="submit" class="btn btn-primary btn-lg">
            <i class="bi bi-person-check me-1"></i>Register
          </button>
        </div>
      </form>
      <div class="form-bottom-link mt-3">
        Already have an account? <a href="{% url 'users:login' %}">Sign in here</a>
      </div>
    </div>

  </div>
</div>
{% endblock %}
