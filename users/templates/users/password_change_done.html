{% extends 'base.html' %}

{% block title %}Password Changed | CampusConnect{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5 text-center">

    <div style="font-size:3rem; color:var(--success);" class="mb-3">
      <i class="bi bi-shield-check-fill"></i>
    </div>
    <h2 class="fw-bold mb-2">Password Updated</h2>
    <p class="text-muted mb-4">Your password has been changed successfully. You're all set.</p>

    <a href="{% url 'users:dashboard' %}" class="btn btn-primary">
      <i class="bi bi-house me-1"></i>Back to Dashboard
    </a>

  </div>
</div>
{% endblock %}
