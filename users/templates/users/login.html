{% extends 'base.html' %}

{% block title %}Login | CampusConnect{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">

    <div class="text-center mb-4">
      <div style="font-size:2.5rem; color:var(--primary);">
        <i class="bi bi-mortarboard-fill"></i>
      </div>
      <h1 class="h3 fw-bold mt-2">Welcome back</h1>
      <p class="text-muted">Sign in to CampusConnect</p>
    </div>

    <div class="card-container">
      <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label" for="id_username">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" id="id_username"
                   class="form-control" placeholder="Your username" required autofocus>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label" for="id_password">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" id="id_password"
                   class="form-control" placeholder="Your password" required>
          </div>
        </div>
        <div class="d-grid mt-4">
          <button type="submit" class="btn btn-primary btn-lg">
            <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
          </button>
        </div>
      </form>
      <div class="form-bottom-link mt-3">
        New here? <a href="{% url 'users:register' %}">Create an account</a>
      </div>
    </div>

    <div class="card mt-4 border-0" style="background:transparent;">
      <div class="card-body text-center">
        <figure>
          <blockquote class="blockquote">
            <p>"The important thing is not to stop questioning."</p>
          </blockquote>
          <figcaption class="blockquote-footer">Albert Einstein</figcaption>
        </figure>
      </div>
    </div>

  </div>
</div>
{% endblock %}
